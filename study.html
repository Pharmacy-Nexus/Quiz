<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Mode | Pharmacy Nexus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css">
</head>

<body data-page="study">
    <header class="topbar">
        <div class="container nav"><a class="brand" href="index.html">
                <div class="logo">PN</div>
                <div>Pharmacy Nexus</div>
            </a>
            <nav class="nav-links" data-nav></nav>
        </div>
    </header>
    <main class="section">
        <div class="container study-layout">
            <aside class="sidebar card"><span class="badge">Study Mode</span>
                <h2 id="studyTitle" style="margin-top:14px;">Study Set</h2>
                <div class="meta-row" id="studyMeta"></div>
                <div class="divider"></div>
                <p><strong id="studyCounter"></strong></p>
                <div class="progress-wrap">
                    <div class="progress-bar" id="studyProgress"></div>
                </div>
                <div class="actions"><button id="prevBtn" class="btn-secondary">Previous</button><button id="revealBtn"
                        class="btn">Reveal Answer</button><button id="nextBtn" class="btn-secondary">Next</button></div>
            </aside>
            <section class="card question-card">
                <div id="studyQuestionBody"></div>
            </section>
        </div>
    </main>
    <footer class="footer">
        <div class="container footer-box">
            <div><strong>Contact: pharmacynexusofficial@gmail.com</strong>
                <p class="small">For feedback, collaboration, or educational contributions, feel free to contact us.</p>
            </div>
            <p class="small muted">© <span data-year></span> Pharmacy Nexus</p>
        </div>
    </footer>
    <script src="assets/app.js"></script>
</body>

</html>
