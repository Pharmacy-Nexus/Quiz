<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacy Nexus Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');

  :root {
    --bot-primary: #00151b;
    --bot-secondary: #316574;
    --bot-accent: #cba72f;
    --bot-surface: #ffffff;
    --bot-shadow: rgba(0, 21, 27, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ====== BOT CONTAINER ====== */
  .pn-bot-wrapper {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 9998;
    font-family: 'Cairo', sans-serif;
    direction: rtl;
  }

  /* ====== THE BOT CHARACTER (SVG) ====== */
  .pn-bot-character {
    width: 80px;
    height: 80px;
    cursor: pointer;
    position: relative;
    filter: drop-shadow(0 8px 24px var(--bot-shadow));
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .pn-bot-character:hover {
    transform: scale(1.1) translateY(-4px);
  }

  .pn-bot-character:active {
    transform: scale(0.95);
  }

  /* Idle floating animation */
  @keyframes botFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  .pn-bot-character.idle {
    animation: botFloat 3s ease-in-out infinite;
  }

  /* Wave animation when greeting */
  @keyframes botWave {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-15deg); }
    75% { transform: rotate(15deg); }
  }

  .pn-bot-character.waving .bot-arm-right {
    animation: botWave 0.6s ease-in-out 3;
    transform-origin: 55px 45px;
  }

  /* Thinking animation */
  @keyframes botThink {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(0.8); }
  }

  .pn-bot-character.thinking {
    animation: botThink 1s ease-in-out infinite;
  }

  /* ====== SPEECH BUBBLE ====== */
  .pn-bot-bubble {
    position: absolute;
    bottom: 90px;
    left: 0;
    min-width: 220px;
    max-width: 300px;
    background: var(--bot-surface);
    border-radius: 20px 20px 20px 4px;
    padding: 16px 20px;
    box-shadow: 0 12px 40px rgba(0,21,27,0.12), 0 2px 8px rgba(0,21,27,0.06);
    border: 1px solid rgba(193,199,203,0.2);
    opacity: 0;
    transform: translateY(10px) scale(0.9);
    pointer-events: none;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .pn-bot-bubble.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .pn-bot-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 24px;
    width: 16px;
    height: 16px;
    background: var(--bot-surface);
    transform: rotate(45deg);
    border-right: 1px solid rgba(193,199,203,0.2);
    border-bottom: 1px solid rgba(193,199,203,0.2);
  }

  .pn-bot-bubble-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--bot-primary);
    font-weight: 600;
  }

  .pn-bot-bubble-close {
    position: absolute;
    top: 8px;
    left: 12px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--bot-primary);
    color: white;
    border: none;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.6;
    transition: opacity 0.2s;
  }

  .pn-bot-bubble-close:hover { opacity: 1; }

  /* ====== CHAT PANEL (Expanded) ====== */
  .pn-bot-panel {
    position: absolute;
    bottom: 90px;
    left: 0;
    width: 360px;
    max-height: 500px;
    background: var(--bot-surface);
    border-radius: 24px;
    box-shadow: 0 24px 60px rgba(0,21,27,0.15);
    border: 1px solid rgba(193,199,203,0.15);
    opacity: 0;
    transform: translateY(20px) scale(0.95);
    pointer-events: none;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .pn-bot-panel.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .pn-bot-header {
    background: linear-gradient(135deg, var(--bot-primary), var(--bot-secondary));
    padding: 20px 24px;
    color: white;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .pn-bot-header-icon {
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.15);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .pn-bot-header-info h4 {
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 2px;
  }

  .pn-bot-header-info span {
    font-size: 12px;
    opacity: 0.8;
    font-weight: 600;
  }

  .pn-bot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 300px;
  }

  .pn-bot-message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 13px;
    line-height: 1.6;
    font-weight: 600;
    animation: msgPop 0.3s ease-out;
  }

  @keyframes msgPop {
    from { opacity: 0; transform: translateY(8px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .pn-bot-message.bot {
    background: #f3f4f5;
    color: var(--bot-primary);
    align-self: flex-start;
    border-bottom-right-radius: 4px;
  }

  .pn-bot-message.user {
    background: var(--bot-secondary);
    color: white;
    align-self: flex-end;
    border-bottom-left-radius: 4px;
  }

  .pn-bot-quick-actions {
    padding: 16px 20px;
    border-top: 1px solid rgba(193,199,203,0.15);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pn-bot-quick-btn {
    padding: 8px 16px;
    border-radius: 12px;
    border: 1px solid rgba(193,199,203,0.3);
    background: transparent;
    color: var(--bot-primary);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Cairo', sans-serif;
  }

  .pn-bot-quick-btn:hover {
    background: var(--bot-primary);
    color: white;
    border-color: var(--bot-primary);
  }

  .pn-bot-input-area {
    padding: 16px 20px;
    border-top: 1px solid rgba(193,199,203,0.15);
    display: flex;
    gap: 10px;
  }

  .pn-bot-input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 14px;
    border: 1px solid rgba(193,199,203,0.3);
    background: #f8f9fa;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
  }

  .pn-bot-input:focus {
    border-color: var(--bot-secondary);
  }

  .pn-bot-send {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    background: var(--bot-primary);
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }

  .pn-bot-send:hover { transform: scale(1.05); }
  .pn-bot-send:active { transform: scale(0.95); }

  /* ====== TYPING INDICATOR ====== */
  .pn-bot-typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    align-self: flex-start;
  }

  .pn-bot-typing span {
    width: 8px;
    height: 8px;
    background: var(--bot-secondary);
    border-radius: 50%;
    animation: typingBounce 1.4s ease-in-out infinite;
  }

  .pn-bot-typing span:nth-child(2) { animation-delay: 0.2s; }
  .pn-bot-typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ====== NOTIFICATION BADGE ====== */
  .pn-bot-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 22px;
    height: 22px;
    background: #ba1a1a;
    color: white;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid white;
    animation: badgePulse 2s ease-in-out infinite;
  }

  @keyframes badgePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  /* ====== DARK MODE SUPPORT ====== */
  html.dark .pn-bot-bubble,
  html.dark .pn-bot-panel {
    background: #1d2528;
    border-color: rgba(167,204,218,0.15);
  }

  html.dark .pn-bot-bubble::after {
    background: #1d2528;
    border-color: rgba(167,204,218,0.15);
  }

  html.dark .pn-bot-bubble-text,
  html.dark .pn-bot-quick-btn,
  html.dark .pn-bot-input {
    color: #f0f1f2;
  }

  html.dark .pn-bot-quick-btn {
    border-color: rgba(167,204,218,0.2);
  }

  html.dark .pn-bot-quick-btn:hover {
    background: #f0f1f2;
    color: #00151b;
  }

  html.dark .pn-bot-message.bot {
    background: #263135;
    color: #f0f1f2;
  }

  html.dark .pn-bot-input {
    background: #263135;
    border-color: rgba(167,204,218,0.2);
  }

  /* ====== MOBILE ====== */
  @media (max-width: 480px) {
    .pn-bot-wrapper {
      bottom: 80px;
      left: 16px;
    }
    .pn-bot-panel {
      width: calc(100vw - 32px);
      left: 0;
    }
    .pn-bot-character {
      width: 64px;
      height: 64px;
    }
  }
</style>
</head>
<body>

<!-- ====== PHARMACY BOT ====== -->
<div class="pn-bot-wrapper" id="pnBot">
  
  <!-- Speech Bubble -->
  <div class="pn-bot-bubble" id="pnBotBubble">
    <button class="pn-bot-bubble-close" onclick="PNBot.closeBubble()">×</button>
    <p class="pn-bot-bubble-text" id="pnBotBubbleText">أهلاً بيك! أنا مساعدك الصيدلي 👨‍⚕️ جاهز أساعدك في أي سؤال!</p>
  </div>

  <!-- Chat Panel -->
  <div class="pn-bot-panel" id="pnBotPanel">
    <div class="pn-bot-header">
      <div class="pn-bot-header-icon">🥼</div>
      <div class="pn-bot-header-info">
        <h4>د. نكسس</h4>
        <span>مساعدك الصيدلي الذكي</span>
      </div>
    </div>
    
    <div class="pn-bot-messages" id="pnBotMessages">
      <!-- Messages injected here -->
    </div>

    <div class="pn-bot-quick-actions" id="pnBotQuickActions">
      <button class="pn-bot-quick-btn" onclick="PNBot.ask('ازاي اذاكر صيدلة؟')">💡 نصايح دراسة</button>
      <button class="pn-bot-quick-btn" onclick="PNBot.ask('عايز اسئلة')">📚 اسئلة</button>
      <button class="pn-bot-quick-btn" onclick="PNBot.ask('امتحان نهائي')">📝 امتحان</button>
    </div>

    <div class="pn-bot-input-area">
      <input type="text" class="pn-bot-input" id="pnBotInput" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter')PNBot.send()">
      <button class="pn-bot-send" onclick="PNBot.send()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <!-- Bot Character (SVG) -->
  <div class="pn-bot-character idle" id="pnBotCharacter" onclick="PNBot.toggle()">
    <div class="pn-bot-badge" id="pnBotBadge" style="display:none">1</div>
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Shadow -->
      <ellipse cx="50" cy="92" rx="28" ry="6" fill="rgba(0,21,27,0.08)"/>

      <path d="M50 42 L50 88" stroke="#e1e3e4" stroke-width="1"/>
      <!-- Coat buttons -->
      <circle cx="50" cy="58" r="2" fill="#c1c7cb"/>
      <circle cx="50" cy="70" r="2" fill="#c1c7cb"/>
      <!-- Pocket -->
      <path d="M58 62 L68 62 L67 74 L59 74Z" fill="#f3f4f5" stroke="#e1e3e4" stroke-width="1"/>
      <rect x="60" y="65" width="6" height="2" rx="1" fill="#ba1a1a" opacity="0.3"/>
      
      <!-- Neck -->
      <rect x="42" y="38" width="16" height="8" fill="#f5d0c5"/>
      
      <!-- Head -->
      <ellipse cx="50" cy="30" rx="22" ry="24" fill="#f5d0c5"/>
      
      <!-- Hair -->
      <path d="M28 22 Q28 8 50 6 Q72 8 72 22 Q72 16 65 14 Q50 10 35 14 Q28 16 28 22Z" fill="#2d1b0e"/>
      <path d="M26 24 Q24 30 28 34" fill="none" stroke="#2d1b0e" stroke-width="3" stroke-linecap="round"/>
      <path d="M74 24 Q76 30 72 34" fill="none" stroke="#2d1b0e" stroke-width="3" stroke-linecap="round"/>
      
      <!-- Eyes -->
      <ellipse cx="42" cy="28" rx="4" ry="5" fill="white"/>
      <ellipse cx="58" cy="28" rx="4" ry="5" fill="white"/>
      <circle cx="43" cy="29" r="2.5" fill="#00151b"/>
      <circle cx="57" cy="29" r="2.5" fill="#00151b"/>
      <circle cx="44" cy="28" r="1" fill="white"/>
      <circle cx="58" cy="28" r="1" fill="white"/>
      
      <!-- Eyebrows -->
      <path d="M37 22 Q42 19 47 22" fill="none" stroke="#2d1b0e" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M53 22 Q58 19 63 22" fill="none" stroke="#2d1b0e" stroke-width="1.5" stroke-linecap="round"/>
      
      <!-- Glasses -->
      <circle cx="42" cy="28" r="7" fill="none" stroke="#316574" stroke-width="1.5"/>
      <circle cx="58" cy="28" r="7" fill="none" stroke="#316574" stroke-width="1.5"/>

      <line x1="35" y1="28" x2="28" y2="26" stroke="#316574" stroke-width="1"/>
      <line x1="65" y1="28" x2="72" y2="26" stroke="#316574" stroke-width="1"/>

      <!-- Smile -->
      <path d="M44 44 Q50 50 56 44" fill="none" stroke="#c17a5c" stroke-width="2" stroke-linecap="round"/>
      
      <!-- Stethoscope -->
      <path d="M30 50 Q20 55 22 65 Q24 72 30 70" fill="none" stroke="#4a4a4a" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="30" cy="70" r="4" fill="#c1c7cb" stroke="#4a4a4a" stroke-width="1"/>
      <path d="M70 50 Q80 55 78 65 Q76 72 70 70" fill="none" stroke="#4a4a4a" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="70" cy="70" r="4" fill="#c1c7cb" stroke="#4a4a4a" stroke-width="1"/>
      <path d="M30 50 Q50 58 70 50" fill="none" stroke="#4a4a4a" stroke-width="2"/>
      
      <!-- Right Arm (for waving) -->
      <g class="bot-arm-right">
        <path d="M72 52 Q85 48 88 38" fill="none" stroke="#f5d0c5" stroke-width="8" stroke-linecap="round"/>
        <circle cx="88" cy="36" r="5" fill="#f5d0c5"/>
      </g>
      
      <!-- Left Arm -->
      <path d="M28 52 Q15 58 18 68" fill="none" stroke="#f5d0c5" stroke-width="8" stroke-linecap="round"/>

  </div>
</div>

<script>
// ====== PHARMACY NEXUS BOT ======
const PNBot = {
  isOpen: false,
  bubbleTimer: null,
  speechSynth: window.speechSynthesis,
  currentPage: 'home',
  
  // Knowledge base (free, no API)
  knowledge: {
    greetings: [
      'أهلاً بيك في Pharmacy Nexus! 👨‍⚕️ أنا دكتور نكسس، مساعدك الصيدلي الشخصي.',

    study: {

      'نصايح دراسة': '💡 ادرس 25 دقيقة وريح 5 (Pomodoro) 💡 ارسم الـ Mechanism of Action 💡 اعمل Flashcards للأدوية الصعبة 💡 ذاكر مع زميل عشان تشرحله = تفهم أكتر!',
      'ازاي احفظ أدوية': '🔹 اربط الاسم بالصنف (مثلاً كل -prazole = PPI) 🔹 احفظ الـ Prototype وابني عليه 🔹 استخدم الـ Mnemonics (مثلاً ABCDE للضغط) 🔹 راجع كل يوم 10 دقايق بس!',
      'time management': '⏰ قسم يومك: الصبح للفهم، الظهر للحفظ، المساء للحل. نوم 7-8 ساعات مهم جداً للذاكرة!'
    },
    
    questions: {
      'عايز اسئلة': 'عندك 3 أنواع: 📘 Subjects (موضوع بموضوع) 📗 Daily Challenge (عشوائي يومي) 📝 Final Exam (امتحان شامل). اختار اللي يناسبك!',

    },
    
    exam: {
      'امتحان نهائي': 'Final Exam بيسمحلك تبني امتحان مخصوص: ✅ اختار المواد ✅ اختار الصعوبة ✅ حدد الوقت ✅ شوف نتيجتك فوراً!',

    },
    
    navigation: {
      'subjects': 'روح لـ Subjects عشان تشوف كل المواد: Pharmacology, Pharmaceutics, Clinical Pharmacy... كل مادة مقسمة Topics و Sets.',
      'dashboard': 'Dashboard بيوريك أدائك: 📊 Overall Score, Strong Areas, Weak Areas, Recent Activity, و Achievements!',
      'saved': 'Saved Questions = بنك معرفتك الشخصي! ⭐ اسئلة محفوظة + 📝 ملاحظاتك الخاصة. ممكن تكتب Note على أي سؤال!',
      'profile': 'في Profile تقدر تحط اسمك، جامعتك، هدفك اليومي، وتفعل Auto-next عشان الدراسة تكون أسرع.'
    },
    
    pharmacy: {
      'صيدلة': 'Pharmacy Nexus بيغطي: 💊 Pharmacology (ميكانيزم الأدوية) 💉 Pharmaceutics (التركيبات) 🏥 Clinical Pharmacy (العلاج)',
      'pharmacology': 'Pharmacology = دراسة تأثير الأدوية على الجسم. بتشمل: Pharmacokinetics (ADME) + Pharmacodynamics (Receptor theory)',
      'pharmaceutics': 'Pharmaceutics = علم تصنيع الأدوية. Bioavailability, Dissolution, Formulation design, Drug delivery systems.',
      'clinical pharmacy': 'Clinical Pharmacy = تطبيق الصيدلة على المريض. Drug interactions, Dosing, Therapeutic drug monitoring, Patient counseling.'
    },
    
    default: 'مش فاهم السؤال كويس 😅 جرب تسأل عن: "اسئلة"، "امتحان"، "نصايح دراسة"، أو "subjects". أو ادوس على الزرار السريعة تحت!'
  },

  init() {
    this.detectPage();
    this.showGreeting();
    
    // Listen for page changes
    const observer = new MutationObserver(() => this.detectPage());
    observer.observe(document.body, { childList: true, subtree: true });
    
    // Show bubble after 3 seconds
    setTimeout(() => this.showBubble(), 3000);
  },

  detectPage() {
    const pages = ['home', 'subjects', 'topics', 'sets', 'study', 'review', 'dashboard', 'profile', 'about', 'finalexam', 'examlive', 'saved'];
    for (const p of pages) {
      const el = document.getElementById('page-' + p);
      if (el && el.classList.contains('active')) {
        this.currentPage = p;
        break;
      }
    }
  },

  getContextualGreeting() {
    const greetings = {
      home: 'أهلاً بيك! 👋 جاهز تبدأ رحلتك في Pharmacy Nexus؟',
      subjects: 'اختار المادة اللي عايز تذاكرها! 💊 Pharmacology ولا Pharmaceutics؟',
      topics: 'كويس! دلوقتي اختار الـ Topic اللي هتذاكره 📚',
      sets: 'كل Set فيه 20 سؤال. ابدأ من الأول وكمل خطوة بخطوة! 🎯',
      study: 'ركز في السؤال! لو غلطت متقلقش، الشرح هيظهرلك فوراً 💡',
      review: 'شوف أدائك واراجع غلطاتك. كل خطأ = فرصة تتعلم! 📊',
      dashboard: 'Dashboard بيوريك كل تقدمك. استمر، النتيجة هتيجي! 🏆',
      profile: 'حدث بياناتك وهدفك اليومي عشان تتابع تقدمك! 👤',
      finalexam: 'جهز نفسك! الامتحان هيختبر كل اللي ذاكرته 📝',
      examlive: 'ركز! كل سؤال بيعد. ادوس Submit لما تخلص ⏰',
      saved: 'ده بنك معرفتك! راجع الأسئلة المحفوظة والملاحظات ⭐',
      about: 'Pharmacy Nexus مجاني للصيادلة! شارك مع زمايلك 🌍'
    };
    return greetings[this.currentPage] || this.knowledge.greetings[0];
  },

  showGreeting() {
    const msg = this.getContextualGreeting();
    this.addMessage(msg, 'bot');
  },

  showBubble(text) {
    const bubble = document.getElementById('pnBotBubble');
    const bubbleText = document.getElementById('pnBotBubbleText');
    if (!bubble || !bubbleText) return;
    
    bubbleText.textContent = text || this.getContextualGreeting();
    bubble.classList.add('visible');
    
    // Auto-hide after 8 seconds
    clearTimeout(this.bubbleTimer);
    this.bubbleTimer = setTimeout(() => this.closeBubble(), 8000);
    
    // Speak if supported
    this.speak(bubbleText.textContent);
  },

  closeBubble() {
    const bubble = document.getElementById('pnBotBubble');
    if (bubble) bubble.classList.remove('visible');
    clearTimeout(this.bubbleTimer);
  },

  toggle() {
    this.isOpen = !this.isOpen;
    const panel = document.getElementById('pnBotPanel');
    const char = document.getElementById('pnBotCharacter');
    
    if (this.isOpen) {
      panel.classList.add('open');
      this.closeBubble();
      char.classList.remove('idle');
      char.classList.add('waving');
      setTimeout(() => char.classList.remove('waving'), 2000);
      document.getElementById('pnBotInput')?.focus();
    } else {
      panel.classList.remove('open');
      char.classList.add('idle');
    }
  },

  send() {
    const input = document.getElementById('pnBotInput');
    const text = input?.value.trim();
    if (!text) return;
    
    this.addMessage(text, 'user');
    input.value = '';
    this.processQuery(text);
  },

  ask(text) {
    this.addMessage(text, 'user');
    this.processQuery(text);
    if (!this.isOpen) this.toggle();
  },

  processQuery(text) {
    const lower = text.toLowerCase();
    let response = null;
    
    // Check all knowledge categories
    for (const category of Object.values(this.knowledge)) {
      if (typeof category !== 'object' || category === null) continue;
      for (const [key, value] of Object.entries(category)) {
        if (lower.includes(key)) {
          response = value;
          break;
        }
      }
      if (response) break;
    }
    
    // Show typing indicator
    this.showTyping();
    
    setTimeout(() => {
      this.hideTyping();
      this.addMessage(response || this.knowledge.default, 'bot');
      this.speak(response || this.knowledge.default);
    }, 600 + Math.random() * 400);
  },

  showTyping() {
    const messages = document.getElementById('pnBotMessages');
    const typing = document.createElement('div');
    typing.className = 'pn-bot-typing';
    typing.id = 'pnBotTyping';
    typing.innerHTML = '<span></span><span></span><span></span>';
    messages.appendChild(typing);
    messages.scrollTop = messages.scrollHeight;
  },

  hideTyping() {
    const typing = document.getElementById('pnBotTyping');
    if (typing) typing.remove();
  },

  addMessage(text, sender) {
    const messages = document.getElementById('pnBotMessages');
    const msg = document.createElement('div');
    msg.className = `pn-bot-message ${sender}`;
    msg.textContent = text;
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
  },

  speak(text) {
    if (!this.speechSynth) return;
    // Stop previous speech
    this.speechSynth.cancel();
    
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'ar-SA';
    utterance.rate = 1;
    utterance.pitch = 1;
    
    // Try to find Arabic voice
    const voices = this.speechSynth.getVoices();
    const arVoice = voices.find(v => v.lang.includes('ar'));
    if (arVoice) utterance.voice = arVoice;
    
    this.speechSynth.speak(utterance);
  },

  // Show notification badge
  notify(count) {
    const badge = document.getElementById('pnBotBadge');
    if (badge) {
      badge.textContent = count;
      badge.style.display = 'flex';
    }
  },

  // Trigger wave animation
  wave() {
    const char = document.getElementById('pnBotCharacter');
    char.classList.add('waving');
    setTimeout(() => char.classList.remove('waving'), 2000);
  }
};

// Initialize when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => PNBot.init());
} else {
  PNBot.init();
}

// Expose to window for debugging
window.PNBot = PNBot;
</script>
