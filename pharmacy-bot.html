<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacy Nexus Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bot-primary: #00151b;
    --bot-secondary: #316574;
    --bot-accent: #cba72f;
    --bot-surface: #ffffff;
    --bot-shadow: rgba(0, 21, 27, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ====== BOT CONTAINER - RIGHT SIDE ====== */
  .pn-bot-wrapper {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9998;
    font-family: 'Cairo', 'Inter', sans-serif;
    direction: rtl;
  }

  /* ====== THE BOT CHARACTER (SVG) ====== */
  .pn-bot-character {
    width: 72px;
    height: 72px;
    cursor: pointer;
    position: relative;
    filter: drop-shadow(0 8px 24px var(--bot-shadow));
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .pn-bot-character:hover {
    transform: scale(1.1) translateY(-4px);
  }

  .pn-bot-character:active {
    transform: scale(0.95);
  }

  @keyframes botFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  .pn-bot-character.idle {
    animation: botFloat 3s ease-in-out infinite;
  }

  @keyframes botWave {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-15deg); }
    75% { transform: rotate(15deg); }
  }

  .pn-bot-character.waving .bot-arm-right {
    animation: botWave 0.6s ease-in-out 3;
    transform-origin: 55px 45px;
  }

  @keyframes botThink {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(0.8); }
  }

  .pn-bot-character.thinking {
    animation: botThink 1s ease-in-out infinite;
  }

  /* ====== SPEECH BUBBLE ====== */
  .pn-bot-bubble {
    position: absolute;
    bottom: 86px;
    right: 0;
    min-width: 240px;
    max-width: 320px;
    background: var(--bot-surface);
    border-radius: 20px 20px 4px 20px;
    padding: 16px 20px;
    box-shadow: 0 12px 40px rgba(0,21,27,0.12), 0 2px 8px rgba(0,21,27,0.06);
    border: 1px solid rgba(193,199,203,0.2);
    opacity: 0;
    transform: translateY(10px) scale(0.9);
    pointer-events: none;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .pn-bot-bubble.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .pn-bot-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    right: 24px;
    width: 16px;
    height: 16px;
    background: var(--bot-surface);
    transform: rotate(45deg);
    border-left: 1px solid rgba(193,199,203,0.2);
    border-bottom: 1px solid rgba(193,199,203,0.2);
  }

  .pn-bot-bubble-text {
    font-size: 13px;
    line-height: 1.7;
    color: var(--bot-primary);
    font-weight: 600;
    padding-left: 20px;
  }

  .pn-bot-bubble-close {
    position: absolute;
    top: 8px;
    left: 10px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--bot-primary);
    color: white;
    border: none;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.6;
    transition: opacity 0.2s;
    line-height: 1;
  }

  .pn-bot-bubble-close:hover { opacity: 1; }

  /* ====== CHAT PANEL ====== */
  .pn-bot-panel {
    position: absolute;
    bottom: 86px;
    right: 0;
    width: 380px;
    max-height: 520px;
    background: var(--bot-surface);
    border-radius: 24px;
    box-shadow: 0 24px 60px rgba(0,21,27,0.15);
    border: 1px solid rgba(193,199,203,0.15);
    opacity: 0;
    transform: translateY(20px) scale(0.95);
    pointer-events: none;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .pn-bot-panel.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .pn-bot-header {
    background: linear-gradient(135deg, var(--bot-primary), var(--bot-secondary));
    padding: 18px 22px;
    color: white;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .pn-bot-header-icon {
    width: 42px;
    height: 42px;
    background: rgba(255,255,255,0.15);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .pn-bot-header-info h4 {
    font-size: 15px;
    font-weight: 800;
    margin-bottom: 2px;
    letter-spacing: -0.01em;
  }

  .pn-bot-header-info span {
    font-size: 11px;
    opacity: 0.85;
    font-weight: 600;
  }

  .pn-bot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 300px;
  }

  .pn-bot-message {
    max-width: 88%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 12.5px;
    line-height: 1.65;
    font-weight: 600;
    animation: msgPop 0.3s ease-out;
  }

  @keyframes msgPop {
    from { opacity: 0; transform: translateY(8px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .pn-bot-message.bot {
    background: #f3f4f5;
    color: var(--bot-primary);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .pn-bot-message.user {
    background: var(--bot-secondary);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .pn-bot-quick-actions {
    padding: 14px 18px;
    border-top: 1px solid rgba(193,199,203,0.15);
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .pn-bot-quick-btn {
    padding: 7px 14px;
    border-radius: 12px;
    border: 1px solid rgba(193,199,203,0.3);
    background: transparent;
    color: var(--bot-primary);
    font-size: 11.5px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Cairo', 'Inter', sans-serif;
  }

  .pn-bot-quick-btn:hover {
    background: var(--bot-primary);
    color: white;
    border-color: var(--bot-primary);
  }

  .pn-bot-input-area {
    padding: 14px 18px;
    border-top: 1px solid rgba(193,199,203,0.15);
    display: flex;
    gap: 10px;
  }

  .pn-bot-input {
    flex: 1;
    padding: 11px 15px;
    border-radius: 14px;
    border: 1px solid rgba(193,199,203,0.3);
    background: #f8f9fa;
    font-family: 'Cairo', 'Inter', sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
  }

  .pn-bot-input:focus {
    border-color: var(--bot-secondary);
  }

  .pn-bot-send {
    width: 40px;
    height: 40px;
    border-radius: 14px;
    background: var(--bot-primary);
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .pn-bot-send:hover { transform: scale(1.05); }
  .pn-bot-send:active { transform: scale(0.95); }

  /* ====== TYPING ====== */
  .pn-bot-typing {
    display: flex;
    gap: 4px;
    padding: 11px 15px;
    align-self: flex-start;
  }

  .pn-bot-typing span {
    width: 7px;
    height: 7px;
    background: var(--bot-secondary);
    border-radius: 50%;
    animation: typingBounce 1.4s ease-in-out infinite;
  }

  .pn-bot-typing span:nth-child(2) { animation-delay: 0.2s; }
  .pn-bot-typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* ====== BADGE ====== */
  .pn-bot-badge {
    position: absolute;
    top: -3px;
    left: -3px;
    width: 20px;
    height: 20px;
    background: #ba1a1a;
    color: white;
    border-radius: 50%;
    font-size: 10px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid white;
    animation: badgePulse 2s ease-in-out infinite;
  }

  @keyframes badgePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  /* ====== DARK MODE ====== */
  html.dark .pn-bot-bubble,
  html.dark .pn-bot-panel {
    background: #1d2528;
    border-color: rgba(167,204,218,0.15);
  }

  html.dark .pn-bot-bubble::after {
    background: #1d2528;
    border-color: rgba(167,204,218,0.15);
  }

  html.dark .pn-bot-bubble-text,
  html.dark .pn-bot-quick-btn,
  html.dark .pn-bot-input {
    color: #f0f1f2;
  }

  html.dark .pn-bot-quick-btn {
    border-color: rgba(167,204,218,0.2);
  }

  html.dark .pn-bot-quick-btn:hover {
    background: #f0f1f2;
    color: #00151b;
  }

  html.dark .pn-bot-message.bot {
    background: #263135;
    color: #f0f1f2;
  }

  html.dark .pn-bot-input {
    background: #263135;
    border-color: rgba(167,204,218,0.2);
  }

  /* ====== MOBILE ====== */
  @media (max-width: 480px) {
    .pn-bot-wrapper {
      bottom: 80px;
      right: 12px;
      left: auto;
    }
    .pn-bot-panel {
      width: calc(100vw - 24px);
      right: 0;
      left: auto;
    }
    .pn-bot-character {
      width: 60px;
      height: 60px;
    }
  }

  /* ====== ENHANCED TOAST ====== */
  .pn-toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    z-index: 10000;
    min-width: 280px;
    max-width: 420px;
    padding: 14px 22px;
    border-radius: 16px;
    font-family: 'Cairo', 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.5;
    box-shadow: 0 16px 40px rgba(0,21,27,0.18);
    opacity: 0;
    pointer-events: none;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-align: center;
    direction: rtl;
  }

  .pn-toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }

  .pn-toast.success {
    background: #316574;
    color: #ffffff;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .pn-toast.error {
    background: #ba1a1a;
    color: #ffffff;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .pn-toast.info {
    background: #ffffff;
    color: #00151b;
    border: 1px solid rgba(193,199,203,0.3);
  }

  html.dark .pn-toast.info {
    background: #1d2528;
    color: #f0f1f2;
    border-color: rgba(167,204,218,0.2);
  }
</style>
</head>
<body>

<!-- Enhanced Toast Container -->
<div id="pnToastRoot"></div>

<!-- ====== PHARMACY BOT ====== -->
<div class="pn-bot-wrapper" id="pnBot">
  
  <!-- Speech Bubble -->
  <div class="pn-bot-bubble" id="pnBotBubble">
    <button class="pn-bot-bubble-close" onclick="PNBot.closeBubble()">&times;</button>
    <p class="pn-bot-bubble-text" id="pnBotBubbleText">Ahlan! I'm Dr. Nexus, your pharmacy assistant. Ready to help you study!</p>

  <!-- Chat Panel -->

  <!-- Bot Character (SVG) -->
  <div class="pn-bot-character idle" id="pnBotCharacter" onclick="PNBot.toggle()">

<script>
// ====== ENHANCED TOAST SYSTEM ======
const PNToast = {
  root: null,
  timer: null,
  
  init() {
    this.root = document.getElementById('pnToastRoot');
    if (!this.root) {
      this.root = document.createElement('div');
      this.root.id = 'pnToastRoot';
      document.body.appendChild(this.root);
    }
  },

  show(message, type = 'info', duration = 3000) {
    if (!this.root) this.init();
    
    // Clear existing
    this.root.innerHTML = '';
    clearTimeout(this.timer);
    
    const toast = document.createElement('div');
    toast.className = `pn-toast ${type}`;
    toast.textContent = message;
    this.root.appendChild(toast);
    
    // Trigger animation
    requestAnimationFrame(() => {
      toast.classList.add('visible');
    });
    
    this.timer = setTimeout(() => {
      toast.classList.remove('visible');
      setTimeout(() => toast.remove(), 350);
    }, duration);
  }
};

// Override existing showToast if present
window.showToast = (message, type = 'info') => PNToast.show(message, type, 2800);

// ====== PHARMACY NEXUS BOT ======
const PNBot = {

  currentPage: 'home',

  // Knowledge base - NO EMOJIS

      'how to study pharmacy': 'Study in 25-minute focused blocks with 5-minute breaks (Pomodoro). Draw mechanism of action diagrams. Make flashcards for difficult drugs. Study with a peer - explaining to others helps you understand better.',
      'how to memorize drugs': 'Link the name to the class (e.g., all -prazole drugs are PPIs). Learn the prototype drug first, then build on it. Use mnemonics. Review for 10 minutes daily rather than cramming.',

    navigation: {

      'dashboard': 'Dashboard shows your performance: Overall Score, Strong Areas, Weak Areas, Recent Activity, and Achievements.',
      'saved': 'Saved Questions is your personal knowledge bank. Starred questions plus your personal notes. You can write a note on any question.',

      'notes': 'You can add personal clinical notes to any question. These notes appear in your Saved Questions section and can be exported as PDF.',
      'export': 'Export your notes as a PDF from the Saved Questions page. Great for printing or sharing with study groups.',
      'copy guard': 'During study and exam review, copy and paste are disabled to protect question integrity and encourage honest practice.'
    },
    
    default: 'I am not sure I understand. Try asking about: study tips, questions, final exam, subjects, dashboard, saved, profile, pharmacology, pharmaceutics, or clinical pharmacy. Or use the quick buttons below!'
  },

  // Page explanations - contextual
  pageExplanations: {
    home: {
      ar: 'Home page: مرحباً بك في Pharmacy Nexus. هنا تشوف إحصائياتك السريعة، تتصفح المواد، تجرب التحدي اليومي، وترجع تكمل من حيث وقفت.',
      en: 'Home page: Welcome to Pharmacy Nexus. Here you see quick stats, browse subjects, try the Daily Challenge, and resume where you left off.'
    },
    subjects: {
      ar: 'Subjects page: هنا كل المواد الدراسية. Pharmacology للميكانيزمات، Pharmaceutics للتركيبات، Clinical Pharmacy للعلاج السريري. اختار مادة وادخل فيها.',
      en: 'Subjects page: All study disciplines are here. Pharmacology for mechanisms, Pharmaceutics for formulations, Clinical Pharmacy for therapy. Pick one and dive in.'
    },
    topics: {
      ar: 'Topics page: المادة مقسمة لمواضيع فرعية. كل موضوع فيه sets من الأسئلة. اختار الموضوع اللي عايز تذاكره.',
      en: 'Topics page: The subject is divided into sub-topics. Each topic has question sets. Choose the topic you want to study.'
    },
    sets: {
      ar: 'Sets page: كل Set فيه 20 سؤال. فيه progress bar يوريك وصلت لفين. لما تخلص كل الـ Sets، يفتحلك Wrong Questions Set.',
      en: 'Sets page: Each set has 20 questions. A progress bar shows how far you have reached. When you finish all sets, the Wrong Questions Set unlocks.'
    },
    study: {
      ar: 'Study page: حل السؤال واختار الإجابة. لو غلطت، الشرح هيظهر فوراً. تقدر تحفظ السؤال أو تضيف ملاحظة شخصية.',
      en: 'Study page: Read the question and choose your answer. If wrong, the explanation appears instantly. You can save the question or add a personal note.'
    },
    review: {
      ar: 'Review page: تحليل أدائك بعد كل session. شوف إجاباتك الصح والغلط، اقرأ الشرح لكل سؤال، وراجع الغلطات.',
      en: 'Review page: Performance analysis after each session. See your correct and wrong answers, read explanations, and review mistakes.'
    },
    dashboard: {
      ar: 'Dashboard page: لوحة تحكمك الشخصية. Overall Score، المواد القوية والضعيفة، آخر نشاط، وإنجازاتك.',
      en: 'Dashboard page: Your personal command center. Overall Score, strong and weak areas, recent activity, and achievements.'
    },
    profile: {
      ar: 'Profile page: بياناتك الشخصية. اسمك، جامعتك، هدفك اليومي، وتفضيلات الدراسة زي Shuffle و Auto-next.',
      en: 'Profile page: Your personal details. Name, university, daily goal, and study preferences like Shuffle and Auto-next.'
    },
    finalexam: {
      ar: 'Final Exam page: ابني امتحانك المخصوص. اختار المواد، الصعوبة، عدد الأسئلة، والوقت. بعدين ابدأ وحل.',
      en: 'Final Exam page: Build your custom exam. Choose subjects, difficulty, question count, and time limit. Then start solving.'
    },
    examlive: {
      ar: 'Live Exam page: الامتحان شغال دلوقتي. ركز في كل سؤال. لو محتاج تفتكر سؤال، علمه بـ Flag. ادوس Submit لما تخلص.',
      en: 'Live Exam page: The exam is running now. Focus on each question. Flag questions you want to revisit. Press Submit when done.'
    },
    saved: {
      ar: 'Saved page: بنك معرفتك الشخصي. الأسئلة المحفوظة والملاحظات. تقدر تبحث، تفلتر، وتصدر ملاحظاتك PDF.',
      en: 'Saved page: Your personal knowledge bank. Saved questions and notes. You can search, filter, and export notes as PDF.'
    },
    about: {
      ar: 'About page: تعرف على Pharmacy Nexus. منصة مجانية للصيادلة. بنساعد الطلاب وال interns والمرشحين لامتحان الترخيص.',
      en: 'About page: Learn about Pharmacy Nexus. A free platform for pharmacists. We help students, interns, and licensure exam candidates.'
    }
  },

  init() {
    this.detectPage();
    this.showGreeting();
    this.tryConnectData();
    
    // Watch for page changes
    const observer = new MutationObserver(() => {
      const oldPage = this.currentPage;
      this.detectPage();
      if (oldPage !== this.currentPage) {
        this.onPageChange();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['class'] });
    
    // Delayed greeting bubble
    setTimeout(() => this.showBubble(), 4000);
  },

  // Try to connect to PN_DATA if available
  tryConnectData() {
    if (typeof PN_DATA !== 'undefined' && PN_DATA.subjectsIndex) {
      this.dataConnected = true;
      this.subjectsData = PN_DATA.subjectsIndex.subjects || [];
      
      // Build topics data
      this.topicsData = [];
      if (PN_DATA.topicsMap) {
        PN_DATA.topicsMap.forEach((subjectData, subjectId) => {
          const subjectMeta = PN_DATA.subjectsMap?.get(subjectId);
          (subjectData.topics || []).forEach(topic => {
            this.topicsData.push({
              ...topic,
              subjectId,
              subjectName: subjectMeta?.name || ''
            });
          });
        });
      }
    }
  },

  detectPage() {
    const pages = ['home','subjects','topics','sets','study','review','dashboard','profile','about','finalexam','examlive','saved'];
    for (const p of pages) {
      const el = document.getElementById('page-' + p);
      if (el && (el.classList.contains('active') || getComputedStyle(el).display !== 'none')) {
        this.currentPage = p;
        break;
      }
    }
  },

  onPageChange() {
    // Update greeting when page changes
    if (this.isOpen) {
      const greeting = this.getContextualGreeting();
      this.addMessage(greeting, 'bot');
    }
  },

  getContextualGreeting() {
    const greetings = {
      home: 'Welcome back! Ready to continue your pharmacy journey?',
      subjects: 'Browse our subjects. Which discipline would you like to explore today?',
      topics: 'Great choice! Now pick a specific topic to study.',
      sets: 'Each set contains 20 questions. Start from Set 1 and work your way up.',
      study: 'Focus on the question. Read carefully before selecting your answer.',
      review: 'Here is your performance breakdown. Review your mistakes to improve.',
      dashboard: 'Your Dashboard shows all your progress. Keep going, you are doing great!',
      profile: 'Update your profile to personalize your study experience.',
      finalexam: 'Ready to test yourself? Configure your exam and start when ready.',
      examlive: 'Stay focused! You are in exam mode. Good luck!',
      saved: 'Your knowledge bank. Review saved questions and personal notes here.',
      about: 'Pharmacy Nexus is free for all pharmacy students. Share it with your peers!'
    };
    return greetings[this.currentPage] || this.knowledge.greetings[0];
  },

  getPageExplanation() {
    const exp = this.pageExplanations[this.currentPage];
    if (!exp) return 'You are currently on the ' + this.currentPage + ' page.';
    // Return bilingual
    return exp.en + ' / ' + exp.ar;
  },

  getDataStats() {
    if (!this.dataConnected) {
      return 'I am still loading the course data. Please try again in a moment.';
    }
    const subjectCount = this.subjectsData.length;
    const topicCount = this.topicsData.length;
    const questionCount = this.subjectsData.reduce((sum, s) => sum + (s.questionsCount || 0), 0);
    return `Currently loaded: ${subjectCount} subjects, ${topicCount} topics, and ${questionCount} total questions.`;
  },

  showGreeting() {
    const msg = this.getContextualGreeting();
    this.addMessage(msg, 'bot');
  },

  showBubble(text) {
    const bubble = document.getElementById('pnBotBubble');
    const bubbleText = document.getElementById('pnBotBubbleText');
    if (!bubble || !bubbleText) return;
    
    bubbleText.textContent = text || this.getContextualGreeting();
    bubble.classList.add('visible');
    
    clearTimeout(this.bubbleTimer);
    this.bubbleTimer = setTimeout(() => this.closeBubble(), 10000);
    
    this.speak(bubbleText.textContent);
  },

  closeBubble() {
    const bubble = document.getElementById('pnBotBubble');
    if (bubble) bubble.classList.remove('visible');
    clearTimeout(this.bubbleTimer);
  },

  toggle() {
    this.isOpen = !this.isOpen;
    const panel = document.getElementById('pnBotPanel');
    const char = document.getElementById('pnBotCharacter');
    
    if (this.isOpen) {
      panel.classList.add('open');
      this.closeBubble();
      char.classList.remove('idle');
      char.classList.add('waving');
      setTimeout(() => char.classList.remove('waving'), 2000);
      document.getElementById('pnBotInput')?.focus();
    } else {
      panel.classList.remove('open');
      char.classList.add('idle');
    }
  },

  send() {
    const input = document.getElementById('pnBotInput');
    const text = input?.value.trim();
    if (!text) return;
    
    this.addMessage(text, 'user');
    input.value = '';
    this.processQuery(text);
  },

  ask(text) {
    this.addMessage(text, 'user');
    this.processQuery(text);
    if (!this.isOpen) this.toggle();
  },

  processQuery(text) {
    const lower = text.toLowerCase().trim();
    let response = null;
    
    // Special commands
    if (lower.includes('explain this page') || lower.includes('explain page') || lower.includes('this page') || lower.includes('page')) {
      response = this.getPageExplanation();
    } else if (lower.includes('stats') || lower.includes('data') || lower.includes('loaded') || lower.includes('subjects count') || lower.includes('how many')) {
      response = this.getDataStats();
    } else if (lower.includes('what is') && (lower.includes('pharmacy nexus') || lower.includes('this site'))) {
      response = 'Pharmacy Nexus is a free structured learning platform for pharmacy students. It covers Pharmacology, Pharmaceutics, and Clinical Pharmacy with practice questions, exams, and progress tracking.';
    } else {
      // Check knowledge categories
      for (const category of Object.values(this.knowledge)) {
        if (typeof category !== 'object' || category === null) continue;
        for (const [key, value] of Object.entries(category)) {
          if (lower.includes(key)) {
            response = value;
            break;
          }
        }
        if (response) break;
      }
    }
    
    this.showTyping();
    
    setTimeout(() => {
      this.hideTyping();
      const finalResponse = response || this.knowledge.default;
      this.addMessage(finalResponse, 'bot');
      this.speak(finalResponse);
    }, 500 + Math.random() * 300);
  },

  showTyping() {
    const messages = document.getElementById('pnBotMessages');
    const typing = document.createElement('div');
    typing.className = 'pn-bot-typing';
    typing.id = 'pnBotTyping';
    typing.innerHTML = '<span></span><span></span><span></span>';
    messages.appendChild(typing);
    messages.scrollTop = messages.scrollHeight;
  },

  hideTyping() {
    const typing = document.getElementById('pnBotTyping');
    if (typing) typing.remove();
  },

  addMessage(text, sender) {
    const messages = document.getElementById('pnBotMessages');
    const msg = document.createElement('div');
    msg.className = `pn-bot-message ${sender}`;
    msg.textContent = text;
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
  },

  speak(text) {
    if (!this.speechSynth) return;
    this.speechSynth.cancel();
    
    // Detect if text is mostly Arabic or English
    const isArabic = /[\u0600-\u06FF]/.test(text);
    const lang = isArabic ? 'ar-SA' : 'en-US';
    const rate = isArabic ? 1 : 0.95;
    
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = lang;
    utterance.rate = rate;
    utterance.pitch = 1;
    
    const voices = this.speechSynth.getVoices();
    const preferredVoice = voices.find(v => v.lang.includes(isArabic ? 'ar' : 'en'));
    if (preferredVoice) utterance.voice = preferredVoice;
    
    this.speechSynth.speak(utterance);
  },

  notify(count) {
    const badge = document.getElementById('pnBotBadge');
    if (badge) {
      badge.textContent = count;
      badge.style.display = 'flex';
    }
  },

  wave() {
    const char = document.getElementById('pnBotCharacter');
    char.classList.add('waving');
    setTimeout(() => char.classList.remove('waving'), 2000);
  }
};

// Initialize
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => PNBot.init());
} else {
  PNBot.init();
}

window.PNBot = PNBot;
</script>
