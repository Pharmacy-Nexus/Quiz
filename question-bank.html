<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question Bank - Pharmacy Nexus</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <h1>Pharmacy Nexus</h1>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="question-bank.html" class="active">Question Bank</a></li>
        <li><a href="final-exam.html">Final Exam</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <section class="qb-header">
      <h1>Question Bank</h1>
      <p>Search and filter through all available questions</p>
    </section>

    <section class="filters-section">
      <div class="filter-group">
        <label for="subjectFilter">Subject:</label>
        <select id="subjectFilter" class="filter-select">
          <option value="">All Subjects</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="topicFilter">Topic:</label>
        <select id="topicFilter" class="filter-select">
          <option value="">All Topics</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="difficultyFilter">Difficulty:</label>
        <select id="difficultyFilter" class="filter-select">
          <option value="">All Difficulties</option>
          <option value="Easy">Easy</option>
          <option value="Medium">Medium</option>
          <option value="Hard">Hard</option>
        </select>
      </div>

      <div class="filter-group search-group">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search questions..."
        >
      </div>

      <button class="btn btn-secondary" id="resetFilters">Reset Filters</button>
    </section>

    <section class="questions-section">
      <div id="questionsContainer" class="questions-list">
        <div class="loading">Loading questions...</div>
      </div>
    </section>

    <section class="pagination-section">
      <button class="btn btn-outline" id="prevPageBtn" style="display: none;">Previous Page</button>
      <span id="pageInfo"></span>
      <button class="btn btn-outline" id="nextPageBtn" style="display: none;">Next Page</button>
    </section>
  </main>

  <script src="js/utils.js"></script>
  <script src="js/github-api.js"></script>
  <script src="js/question-bank.js"></script>
</body>
</html>
