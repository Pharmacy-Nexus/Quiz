<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Set Review</title>

<style>
body{
  background:#0f172a;
  color:#e2e8f0;
  font-family:'Inter', Arial;
  padding:40px;
  max-width:900px;
  margin:auto;
}

h1{
  font-size:32px;
  margin-bottom:20px;
}

#score{
  background:#1e293b;
  padding:15px 20px;
  border-radius:12px;
  margin-bottom:20px;
  font-size:18px;
  font-weight:600;
}

.progress-bar{
  height:8px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:25px;
}

.progress-fill{
  height:100%;
  background:#22c55e;
}

.card{
  background:#1e293b;
  padding:20px;
  margin-bottom:20px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.05);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.question-title{
  font-weight:600;
  margin-bottom:10px;
}

.status{
  margin:10px 0;
  font-weight:600;
}

.correct{
  color:#22c55e;
}

.wrong{
  color:#ef4444;
}

.answer-box{
  background:#0f172a;
  padding:10px 12px;
  border-radius:8px;
  margin-top:10px;
  font-size:14px;
}

.explanation{
  margin-top:10px;
  font-size:14px;
  line-height:1.6;
  opacity:0.9;
}
</style>

</head>

<body>

<h1>Set Review</h1>

<div id="score"></div>

<div class="progress-bar">
  <div id="progressFill" class="progress-fill"></div>
</div>

<div id="container"></div>

<!-- ✅ أزرار التحكم -->
<div style="margin-top:30px; display:flex; gap:10px;">

<button onclick="retrySet()" 
<button onclick="retrySet()" 
style="padding:10px 15px; border:none; border-radius:8px; background:#22c55e; color:white; cursor:pointer;">
🔁 Retry Set
</button>

  <a href="topics.html" 
    style="padding:10px 15px; border-radius:8px; background:#3b82f6; color:white; text-decoration:none;">
    ⬅ Back to Topics
  </a>

</div>

<script>

  const data = JSON.parse(localStorage.getItem("pn_review_data") || "{}")

const questions = data.questions || []
const attempts = data.attempts || []

let correctCount = 0

questions.forEach((q,i)=>{

  const attempt = attempts.find(a => a.questionId === q.id)

  const isCorrect = attempt?.correct

  if(isCorrect) correctCount++

  document.getElementById("container").innerHTML += `
    <div class="card">
      <div class="question-title">Question ${i+1}</div>
      <p>${q.question}</p>
      <div class="status ${isCorrect ? 'correct':'wrong'}">
        ${isCorrect ? '✔ Correct' : '✖ Wrong'}
      </div>
      <div class="answer-box">
        <strong>Correct Answer:</strong> ${q.options[q.correctAnswer]}
      </div>
      <div class="explanation">
        ${q.explanation || ''}
      </div>
    </div>
  `
})

let percent = questions.length
  ? Math.round((correctCount/questions.length)*100)
  : 0

document.getElementById("score").innerHTML =
`Score: ${correctCount}/${questions.length} — ${percent}%`

document.getElementById("progressFill").style.width = percent + "%"


// ✅ هنا تحط الدالة
function retrySet(){
  const data = JSON.parse(localStorage.getItem("pn_review_data") || "{}");
  
  if(data.url){
    window.location.href = data.url;
  } else {
    alert("Error: original quiz not found");
  }
}

</script>

</body>
</html>
