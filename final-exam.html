<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final Exam - Pharmacy Nexus</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <h1>Pharmacy Nexus</h1>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="question-bank.html">Question Bank</a></li>
        <li><a href="final-exam.html" class="active">Final Exam</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <section id="examSetupScreen" class="exam-setup">
      <h1>Final Exam</h1>
      <p>Configure your exam settings</p>

      <div class="exam-mode-selector">
        <button class="mode-btn active" data-mode="multiple" onclick="selectExamMode('multiple')">
          <h3>Multiple Subjects</h3>
          <p>Select from multiple subjects</p>
        </button>
        <button class="mode-btn" data-mode="single" onclick="selectExamMode('single')">
          <h3>Single Subject</h3>
          <p>Focus on one subject</p>
        </button>
      </div>

      <div id="multipleSubjectSetup" class="exam-config">
        <div class="config-group">
          <label for="multiSubjectSelect">Subject:</label>
          <select id="multiSubjectSelect" class="filter-select">
            <option value="all">All Subjects</option>
          </select>
        </div>

        <div class="config-group">
          <label for="multiDifficulty">Difficulty:</label>
          <select id="multiDifficulty" class="filter-select">
            <option value="all">All Difficulties</option>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
        </div>

        <div class="config-group">
          <label for="multiQuestionCount">Number of Questions:</label>
          <input type="number" id="multiQuestionCount" value="50" min="10" max="200">
        </div>

        <div class="config-group">
          <label for="multiTimeLimit">Time Limit (minutes):</label>
          <input type="number" id="multiTimeLimit" value="60" min="0">
        </div>

        <button class="btn btn-primary btn-large" onclick="startMultipleSubjectExam()">Start Exam</button>
      </div>

      <div id="singleSubjectSetup" class="exam-config" style="display: none;">
        <div class="config-group">
          <label for="singleSubjectSelect">Subject:</label>
          <select id="singleSubjectSelect" class="filter-select">
            <option value="">Select a subject</option>
          </select>
        </div>

        <div id="topicsChecklistContainer" style="display: none;">
          <h3>Select Topics:</h3>
          <div class="topics-checklist" id="topicsChecklist"></div>
        </div>

        <div class="config-group" id="singleDifficultyGroup">
          <label for="singleDifficulty">Difficulty:</label>
          <select id="singleDifficulty" class="filter-select">
            <option value="all">All Difficulties</option>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
        </div>

        <div class="config-group" id="singleQuestionGroup">
          <label for="singleQuestionCount">Number of Questions:</label>
          <input type="number" id="singleQuestionCount" value="50" min="10" max="200">
        </div>

        <div class="config-group">
          <label for="singleTimeLimit">Time Limit (minutes):</label>
          <input type="number" id="singleTimeLimit" value="60" min="0">
        </div>

        <button class="btn btn-primary btn-large" onclick="startSingleSubjectExam()" id="startSingleBtn" style="display: none;">Start Exam</button>
      </div>
    </section>

    <section id="examScreen" class="exam-container" style="display: none;">
      <div class="exam-header">
        <div class="exam-info">
          <h2 id="examTitle"></h2>
          <p id="examProgress">Question 1 of 50</p>
        </div>
        <div class="timer">
          <span id="timeDisplay">60:00</span>
        </div>
        <button class="btn btn-outline" id="exitExamBtn">Exit Exam</button>
      </div>

      <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="exam-card">
        <div class="question-section">
          <div class="question-metadata">
            <span class="difficulty" id="difficultyBadge">Easy</span>
            <span class="question-type" id="typeBadge">MCQ</span>
          </div>
          <h3 id="questionText"></h3>

          <div id="caseScenarioContainer" style="display: none;">
            <div class="case-scenario">
              <h4>Case Scenario:</h4>
              <p id="caseScenario"></p>
            </div>
          </div>

          <div id="imageContainer" style="display: none;">
            <img id="questionImage" alt="Question image" class="question-image">
          </div>

          <div class="quiz-options" id="optionsContainer"></div>
        </div>
      </div>

      <div class="exam-navigation">
        <button class="btn btn-outline" id="prevBtn">Previous</button>
        <button class="btn btn-primary" id="nextBtn">Next</button>
        <button class="btn btn-success" id="submitBtn" style="display: none;">Submit Exam</button>
      </div>
    </section>

    <div id="resultsModal" class="modal" style="display: none;">
      <div class="modal-content results-modal">
        <div class="results-header">
          <h2>Exam Results</h2>
        </div>
        <div class="results-summary">
          <div class="score-display">
            <div class="score-circle">
              <span id="scorePercentage">75%</span>
            </div>
            <p id="scoreMessage"></p>
          </div>
          <div class="results-stats">
            <div class="stat">
              <span class="label">Correct Answers:</span>
              <span id="correctCount" class="value">37</span>
            </div>
            <div class="stat">
              <span class="label">Total Questions:</span>
              <span id="totalCount" class="value">50</span>
            </div>
            <div class="stat">
              <span class="label">Time Taken:</span>
              <span id="timeTaken" class="value">45:30</span>
            </div>
          </div>
        </div>
        <div class="results-actions">
          <button class="btn btn-secondary" onclick="reviewExamAnswers()">Review Answers</button>
          <button class="btn btn-primary" onclick="returnHome()">Return to Home</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script src="js/github-api.js"></script>
  <script src="js/final-exam.js"></script>
</body>
</html>
