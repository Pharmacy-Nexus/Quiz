<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin • Pharmacy Nexus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="admin">
  <header class="site-header admin-header">
    <div class="container nav-shell admin-nav-shell">
      <a class="brand" href="index.html">
        <span class="brand-logo"><svg viewBox="0 0 24 24"><path d="M4 12.75V6.5a1.5 1.5 0 0 1 1.5-1.5h9.879a1.5 1.5 0 0 1 1.06.44l2.121 2.121A1.5 1.5 0 0 1 19 8.621V17.5A1.5 1.5 0 0 1 17.5 19h-12A1.5 1.5 0 0 1 4 17.5v-1.75M9 8h4m-4 3h6m-6 3h4M2 12h6m-3-3v6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <span class="brand-text two-line">Pharmacy<br>Nexus</span>
      </a>
      <nav class="main-nav compact-nav">
        <a class="nav-link" href="subjects.html">Subjects</a>
        <a class="nav-link" href="final-exam.html">Final Exam</a>
        <a class="nav-link" href="dashboard.html">Dashboard</a>
      </nav>
    </div>
  </header>

  <main class="admin-main">
    <div class="admin-shell container">
      <aside class="admin-sidebar card panel-card">
        <button class="sidebar-link active" data-admin-view="subjects">Subjects</button>
        <button class="sidebar-link" data-admin-view="topics">Topics</button>
        <button class="sidebar-link" data-admin-view="questions">Questions</button>
        <button class="sidebar-link" data-admin-view="quizsets">Quiz Sets</button>
        <button class="sidebar-link" data-admin-view="settings">Settings</button>
      </aside>

      <section class="admin-content card panel-card">
        <div id="adminViewSubjects" class="admin-view">
          <div class="admin-header-row">
            <h2>Manage Subjects</h2>
            <button id="showAddSubjectBtn" class="btn btn-primary">+ Add Subject</button>
          </div>
          <form id="subjectForm" class="inline-form hidden">
            <input id="subjectNameInput" type="text" placeholder="e.g. Pharmacology" required />
            <button class="btn btn-primary" type="submit">Save</button>
            <button class="btn btn-ghost" type="button" data-cancel-form="subjectForm">Cancel</button>
          </form>
          <div id="adminSubjectsList" class="stack-list"></div>
        </div>

        <div id="adminViewTopics" class="admin-view hidden">
          <div class="admin-header-row">
            <h2>Manage Topics</h2>
            <button id="showAddTopicBtn" class="btn btn-primary">+ Add Topic</button>
          </div>
          <label class="field">
            <span>Select Subject</span>
            <select id="adminTopicSubjectSelect"></select>
          </label>
          <form id="topicForm" class="inline-form hidden">
            <input id="topicNameInput" type="text" placeholder="e.g. Sedatives & Hypnotics" required />
            <button class="btn btn-primary" type="submit">Save</button>
            <button class="btn btn-ghost" type="button" data-cancel-form="topicForm">Cancel</button>
          </form>
          <div id="adminTopicsList" class="stack-list"></div>
        </div>

        <div id="adminViewQuestions" class="admin-view hidden">
          <div class="admin-header-row">
            <h2>Manage Questions</h2>
            <button id="showAddQuestionBtn" class="btn btn-primary">+ Add Question</button>
          </div>
          <div class="form-grid two-col">
            <label class="field">
              <span>Subject</span>
              <select id="adminQuestionSubjectSelect"></select>
            </label>
            <label class="field">
              <span>Topic</span>
              <select id="adminQuestionTopicSelect"></select>
            </label>
          </div>
          <form id="questionForm" class="form-stack hidden">
            <div class="form-grid two-col">
              <label class="field"><span>Question Type</span><select id="questionTypeInput"><option>Standard MCQ</option><option>Clinical Case</option></select></label>
              <label class="field"><span>Difficulty</span><select id="questionDifficultyInput"><option>easy</option><option selected>medium</option><option>hard</option></select></label>
            </div>
            <label class="field"><span>Question Text</span><textarea id="questionTextInput" rows="3" required></textarea></label>
            <label class="field"><span>Case Scenario</span><textarea id="questionCaseInput" rows="3"></textarea></label>
            <div class="form-grid two-col">
              <label class="field"><span>Option 1</span><input id="option1Input" type="text" required /></label>
              <label class="field"><span>Option 2</span><input id="option2Input" type="text" required /></label>
              <label class="field"><span>Option 3</span><input id="option3Input" type="text" required /></label>
              <label class="field"><span>Option 4</span><input id="option4Input" type="text" required /></label>
            </div>
            <label class="field"><span>Correct Answer</span><select id="correctAnswerInput"><option value="0">Option 1</option><option value="1">Option 2</option><option value="2">Option 3</option><option value="3">Option 4</option></select></label>
            <label class="field"><span>Explanation</span><textarea id="questionExplanationInput" rows="4" required></textarea></label>
            <div class="panel-actions">
              <button class="btn btn-primary" type="submit">Save Question</button>
              <button class="btn btn-ghost" type="button" data-cancel-form="questionForm">Cancel</button>
            </div>
          </form>
          <div id="adminQuestionsList" class="stack-list"></div>
        </div>

        <div id="adminViewQuizsets" class="admin-view hidden">
          <div class="admin-header-row">
            <h2>Manage Quiz Sets</h2>
            <button id="showAddQuizsetBtn" class="btn btn-primary">+ New Quiz Set</button>
          </div>
          <form id="quizsetForm" class="form-stack hidden">
            <label class="field"><span>Quiz Name</span><input id="quizsetNameInput" type="text" required /></label>
            <div class="form-grid two-col">
              <label class="field"><span>Subject</span><select id="quizsetSubjectSelect"></select></label>
              <label class="field"><span>Topic</span><select id="quizsetTopicSelect"></select></label>
            </div>
            <label class="field"><span>Time Limit (minutes)</span><input id="quizsetTimeInput" type="number" min="1" value="10" required /></label>
            <div class="panel-actions">
              <button class="btn btn-primary" type="submit">Save Quiz Set</button>
              <button class="btn btn-ghost" type="button" data-cancel-form="quizsetForm">Cancel</button>
            </div>
          </form>
          <div id="adminQuizsetsList" class="stack-list"></div>
        </div>

        <div id="adminViewSettings" class="admin-view hidden">
          <h2>GitHub Configuration</h2>
          <form id="settingsForm" class="form-stack settings-stack">
            <label class="field"><span>Owner</span><input id="settingOwner" type="text" placeholder="pharmacy-nexus" /></label>
            <label class="field"><span>Repository</span><input id="settingRepo" type="text" placeholder="quiz" /></label>
            <label class="field"><span>Branch</span><input id="settingBranch" type="text" placeholder="main" /></label>
            <label class="field"><span>Token</span><input id="settingToken" type="password" placeholder="Paste token here" /></label>
            <div class="panel-actions">
              <button class="btn btn-primary" type="submit">Save Settings</button>
              <button id="disconnectBtn" class="btn btn-danger" type="button">Disconnect &amp; Logout</button>
            </div>
          </form>
        </div>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
