<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz • Pharmacy Nexus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="quiz">
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="index.html">
        <span class="brand-logo"><svg viewBox="0 0 24 24"><path d="M4 12.75V6.5a1.5 1.5 0 0 1 1.5-1.5h9.879a1.5 1.5 0 0 1 1.06.44l2.121 2.121A1.5 1.5 0 0 1 19 8.621V17.5A1.5 1.5 0 0 1 17.5 19h-12A1.5 1.5 0 0 1 4 17.5v-1.75M9 8h4m-4 3h6m-6 3h4M2 12h6m-3-3v6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <span class="brand-text">Pharmacy Nexus</span>
      </a>
      <nav class="main-nav">
        <a class="nav-link active" href="subjects.html">Subjects</a>
        <a class="nav-link" href="final-exam.html">Final Exam</a>
        <a class="nav-link" href="dashboard.html">Dashboard</a>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <section class="section compact-top">
      <div class="container quiz-layout">
        <aside class="quiz-sidebar card panel-card">
          <p class="eyebrow" id="quizModeLabel">Study Mode</p>
          <h1 class="sidebar-title" id="quizTopicTitle">Topic Quiz</h1>
          <p class="muted" id="quizMetaText">Question-by-question practice with explanations after every answer.</p>
          <div class="progress-shell">
            <div class="progress-head">
              <span id="questionProgressText">Question 1 of 1</span>
              <span id="timerText" class="hidden">00:00</span>
            </div>
            <div class="progress-track"><span id="quizProgressBar"></span></div>
          </div>
          <div class="quiz-sidebar-actions">
            <button id="shuffleBtn" class="btn btn-secondary">Shuffle Questions</button>
            <button id="resetProgressBtn" class="btn btn-ghost">Reset Topic Progress</button>
          </div>
        </aside>

        <section class="quiz-main card panel-card">
          <div class="quiz-top-line">
            <div class="badge-group">
              <span id="subjectBadge" class="soft-badge">Subject</span>
              <span id="topicBadge" class="soft-badge">Topic</span>
              <span id="difficultyBadge" class="soft-badge">Difficulty</span>
            </div>
          </div>
          <h2 id="questionText" class="question-title"></h2>
          <p id="caseScenario" class="case-box hidden"></p>
          <div id="optionsWrap" class="option-list"></div>
          <div class="quiz-actions-row">
            <button id="submitAnswerBtn" class="btn btn-primary">Submit Answer</button>
            <button id="showExplanationBtn" class="btn btn-secondary">Show Explanation</button>
          </div>
          <div id="explanationBox" class="explanation-box hidden"></div>
          <div class="pager-row">
            <button id="prevQuestionBtn" class="btn btn-ghost">Previous</button>
            <button id="nextQuestionBtn" class="btn btn-primary">Next</button>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
