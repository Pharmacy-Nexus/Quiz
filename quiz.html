<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Mode - Pharmacy Nexus</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <h1>Pharmacy Nexus</h1>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="question-bank.html">Question Bank</a></li>
        <li><a href="final-exam.html">Final Exam</a></li>
      </ul>
    </div>
  </nav>

  <main class="container quiz-container">
    <div class="quiz-header">
      <div class="quiz-info">
        <h2 id="quizName"></h2>
        <p id="quizProgress">Question 1 of 10</p>
      </div>
      <div id="timerContainer" style="display: none;" class="timer">
        <span id="timeDisplay">30:00</span>
      </div>
      <button class="btn btn-outline" id="exitQuizBtn">Exit Quiz</button>
    </div>

    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="quiz-card">
      <div class="question-section">
        <div class="question-metadata">
          <span class="difficulty" id="difficultyBadge">Easy</span>
          <span class="question-type" id="typeBadge">MCQ</span>
        </div>
        <h3 id="questionText"></h3>

        <div id="caseScenarioContainer" style="display: none;">
          <div class="case-scenario">
            <h4>Case Scenario:</h4>
            <p id="caseScenario"></p>
          </div>
        </div>

        <div id="imageContainer" style="display: none;">
          <img id="questionImage" alt="Question image" class="question-image">
        </div>

        <div class="quiz-options" id="optionsContainer"></div>
      </div>
    </div>

    <div class="quiz-navigation">
      <button class="btn btn-outline" id="prevBtn">Previous</button>
      <button class="btn btn-primary" id="nextBtn">Next</button>
      <button class="btn btn-success" id="submitBtn" style="display: none;">Submit Quiz</button>
    </div>
  </main>

  <div id="resultsModal" class="modal" style="display: none;">
    <div class="modal-content results-modal">
      <div class="results-header">
        <h2>Quiz Results</h2>
      </div>
      <div class="results-summary">
        <div class="score-display">
          <div class="score-circle">
            <span id="scorePercentage">75%</span>
          </div>
          <p id="scoreMessage"></p>
        </div>
        <div class="results-stats">
          <div class="stat">
            <span class="label">Correct Answers:</span>
            <span id="correctCount" class="value">7</span>
          </div>
          <div class="stat">
            <span class="label">Total Questions:</span>
            <span id="totalCount" class="value">10</span>
          </div>
        </div>
      </div>
      <div class="results-actions">
        <button class="btn btn-secondary" onclick="reviewAnswers()">Review Answers</button>
        <button class="btn btn-primary" onclick="returnHome()">Return to Home</button>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/github-api.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
